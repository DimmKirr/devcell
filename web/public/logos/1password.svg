<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!--
    1Password: shield outline with a keyhole inside.
    Shield: rounded top corners, tapers to a point at bottom.
    Keyhole: circle + narrow rectangle below it.
  -->
  <g fill="#333333">
    <!-- Shield shape -->
    <path d="
      M128,20
      C128,20 44,50 44,56
      L44,138
      C44,178 80,208 128,236
      C176,208 212,178 212,138
      L212,56
      C212,50 128,20 128,20
      Z
    " fill="none" stroke="#333333" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Keyhole: circle on top, tapered slot below -->
    <circle cx="128" cy="110" r="26"/>
    <path d="M114,134 L116,168 L140,168 L142,134 Z"/>
  </g>
</svg>
